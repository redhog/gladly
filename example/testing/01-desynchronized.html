<!DOCTYPE html>
<html>
<head><title>Test 01: desynchronized context</title></head>
<body>
<h2>Test 01: WebGL2 context with <code>{ desynchronized: true }</code></h2>
<p>Creates a WebGL2 context with desynchronized:true and renders 300 frames. Should complete in ~5 seconds.</p>
<canvas id="c" width="800" height="600" style="border:1px solid #ccc"></canvas>
<pre id="log"></pre>
<script>
const canvas = document.getElementById('c');
const log = document.getElementById('log');

function addLog(msg) {
  log.textContent += msg + '\n';
  console.log(msg);
}

canvas.addEventListener('webglcontextlost', (e) => {
  e.preventDefault();
  addLog('EVENT: webglcontextlost fired — GPU context was lost');
});
canvas.addEventListener('webglcontextrestored', () => {
  addLog('EVENT: webglcontextrestored fired');
});

const gl = canvas.getContext('webgl2', { desynchronized: true });
if (!gl) {
  addLog('ERROR: WebGL2 not available');
} else {
  addLog('OK: WebGL2 context created with desynchronized:true');

  const vs = `#version 300 es
    in vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;
  const fs = `#version 300 es
    precision mediump float;
    uniform float u_t;
    out vec4 outColor;
    void main() { outColor = vec4(sin(u_t)*0.5+0.5, 0.2, 0.5, 1.0); }`;

  const prog = compileProgram(gl, vs, fs);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uT = gl.getUniformLocation(prog, 'u_t');
  let frame = 0;
  const start = performance.now();

  function render() {
    gl.uniform1f(uT, frame * 0.05);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    frame++;
    if (frame < 300) {
      requestAnimationFrame(render);
    } else {
      const elapsed = ((performance.now() - start) / 1000).toFixed(2);
      addLog(`DONE: 300 frames in ${elapsed}s — no crash`);
    }
  }
  requestAnimationFrame(render);
}

function compileProgram(gl, vsSrc, fsSrc) {
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vsSrc);
  gl.compileShader(vs);
  if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS))
    addLog('VS error: ' + gl.getShaderInfoLog(vs));

  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fsSrc);
  gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS))
    addLog('FS error: ' + gl.getShaderInfoLog(fs));

  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    addLog('Link error: ' + gl.getProgramInfoLog(prog));
  return prog;
}
</script>
</body>
</html>
